<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connected Underwriting - Prototypes</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Manrope',sans-serif;background:#FAFAFC;color:#222;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
.gradient-bar{height:8px;background:linear-gradient(90deg,#1a0a6e 0%,#3023ae 20%,#c86dd7 50%,#f7a84b 80%,#f5c842 100%);position:fixed;top:0;left:0;right:0;z-index:200}
.container{max-width:640px;width:100%;padding:40px 24px}
h1{font-size:28px;font-weight:700;color:#1a1a2e;margin-bottom:8px}
p.subtitle{font-size:16px;color:#888;margin-bottom:32px}
.card{display:block;background:#fff;border:1px solid #e0e1e9;border-left:4px solid #2322F0;border-radius:6px;padding:20px 24px;margin-bottom:16px;text-decoration:none;color:inherit;transition:box-shadow .12s}
.card:hover{box-shadow:0 2px 12px rgba(0,0,0,.07)}
.card h2{font-size:18px;font-weight:600;color:#1a1a2e;margin-bottom:4px}
.card p{font-size:14px;color:#888}
.card.purple{border-left-color:#9b59b6}
</style>
</head>
<body>
<div class="gradient-bar"></div>
<div class="container">
  <h1>Connected Underwriting</h1>
  <p class="subtitle">UX Prototypes</p>
  <a class="card" href="create-submission.html">
    <h2>Create Submission</h2>
    <p>Submission creation wizard with multi-step workflow</p>
  </a>
  <a class="card purple" href="insurance-settings.html">
    <h2>Insurance Settings</h2>
    <p>Configuration panel for underwriting settings</p>
  </a>
</div>
</body>
</html>
